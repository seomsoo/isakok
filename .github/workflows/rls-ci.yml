name: RLS CI

# RLS 격리 회귀를 PR에서 자동 차단 (ADR-081).
# dev=prod라 실제 DB를 쓸 수 없어 임시 Supabase local stack(Docker)에서 검증.
# 범위는 DB RLS 격리로 제한 — Cron/Vault/pg_net/Apple revoke/Kakao 웹훅 등 외부·확장 요소는 별도 manual smoke.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: rls-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls-smoke:
    name: RLS isolation (Supabase local stack)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # 버전 핀 고정 — `latest`는 드리프트 위험. v2.106.0(2026-06-11)이 `supabase status` 출력을
          # 바꿔 아래 jq 파싱이 깨졌음(SUPABASE_URL 빈 값 → smoke 전부 실패). v2.105.0(2026-06-04)이
          # 마지막 검증된 버전. CLI 올릴 땐 status 출력 포맷 확인 후 함께 갱신.
          version: 2.105.0

      # 마이그레이션(00021 apple_refresh_token 컬럼 포함) + seed를 적용하며 로컬 스택 부팅
      - name: Start Supabase local stack
        run: supabase start

      - name: Run RLS smoke test
        run: |
          STATUS=$(supabase status -o json)
          export SUPABASE_URL=$(echo "$STATUS" | jq -r '.API_URL // empty')
          export SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY // empty')
          export SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY // empty')
          # CLI 드리프트로 status 포맷이 바뀌면 위 값이 비어 smoke가 "전부 실패"로 조용히 깨짐 → 조기 차단
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Failed to parse 'supabase status -o json' (CLI 포맷 변경 의심). Raw status below:"
            supabase status || true
            exit 1
          fi
          pnpm exec tsx scripts/verify/rls-smoke.ts

      - name: Stop Supabase local stack
        if: always()
        run: supabase stop --no-backup

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']
    labels:
      - dependencies
      - bot
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(actions)'
